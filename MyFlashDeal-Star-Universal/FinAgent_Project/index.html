<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAgent AI — الوكيل المالي الذكي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --bg2: #0f1218; --panel: #1a1f2e;
    --border: rgba(99,179,255,0.12); --accent: #3b82f6;
    --purple: #8b5cf6; --text: #e8edf5; --text2: #94a3b8;
    --font: 'IBM Plex Sans Arabic', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 60px; border-bottom: 1px solid var(--border); background: rgba(10,12,15,0.8); backdrop-filter: blur(20px); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(59,130,246,0.3); }
  .main { display: flex; flex: 1; overflow: hidden; }
  .chat-area { flex: 1; display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg2); }
  .input-box { display: flex; gap: 10px; }
  textarea { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); outline: none; resize: none; }
  .send-btn { width: 46px; height: 46px; background: linear-gradient(135deg, var(--accent), var(--purple)); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .msg-bubble { padding: 10px 16px; border-radius: 12px; max-width: 70%; line-height: 1.6; }
  .user-msg { align-self: flex-end; background: var(--accent); color: white; }
  .ai-msg { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="app" style="height: 100vh; display: flex; flex-direction: column;">
  <header>
    <div class="logo"><div class="logo-icon">🤖</div><div class="logo-text">My FlashDeal <span>Star</span></div></div>
    <div style="color: #10b981; font-size: 12px;">● الوكيل متصل</div>
  </header>
  <div class="main">
    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="msg-bubble ai-msg">مرحباً بك في مجلس الاعتبار. عقل الوكيل جاهز لتنفيذ أوامرك.</div>
      </div>
      <div class="input-area">
        <div class="input-box">
          <textarea id="userInput" placeholder="اكتب أمرك هنا..." rows="1"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  const container = document.getElementById('messages');
  
  // رسالة المستخدم
  const userDiv = document.createElement('div');
  userDiv.className = 'msg-bubble user-msg';
  userDiv.innerText = text;
  container.appendChild(userDiv);
  input.value = '';
  container.scrollTop = container.scrollHeight;

  try {
    const response = await fetch('http://127.0.0.1:8000/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await response.json();
    
    // رد الوكيل
    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg-bubble ai-msg';
    aiDiv.innerText = data.reply;
    container.appendChild(aiDiv);
    container.scrollTop = container.scrollHeight;
  } catch (error) {
    const errDiv = document.createElement('div');
    errDiv.className = 'msg-bubble ai-msg';
    errDiv.innerText = "⚠️ لم أستطع الاتصال بالعقل المدبر. تأكد من تشغيل ملف main.py";
    container.appendChild(errDiv);
  }
}
</script>
</body>
</html>
